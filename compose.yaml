services:
  # ============================================
  # Database
  # ============================================
  mysql-payment:
    image: mysql:9.0
    container_name: pdPay-mysql-payment
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pdPay_payment
    volumes:
      - mysql-payment-data:/var/lib/mysql

  mysql-wallet:
    image: mysql:9.0
    container_name: pdPay-mysql-wallet
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pdPay_wallet
    volumes:
      - mysql-wallet-data:/var/lib/mysql

  mysql-settlement:
    image: mysql:9.0
    container_name: pdPay-mysql-settlement
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pdPay_settlement
    volumes:
      - mysql-settlement-data:/var/lib/mysql

  mysql-member:
    image: mysql:9.0
    container_name: pdPay-mysql-member
    ports:
      - "3309:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pdPay_member
    volumes:
      - mysql-member-data:/var/lib/mysql

  # ============================================
  # Messaging
  # ============================================

  # Kafka 4.0 - KRaft 모드 (ZooKeeper 제거)
  kafka:
    image: apache/kafka:4.0.0
    container_name: pdPay-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: "PayFlowKafkaCluster001"
    volumes:
      - kafka-data:/tmp/kraft-combined-logs

  # RabbitMQ 4.x
  rabbitmq:
    image: rabbitmq:4-management
    container_name: pdPay-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

  # ============================================
  # redis
  # ============================================
  redis:
    image: redis:8.0.16-alpine
    container_name: pdPay-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data

  # ============================================
  # Monitoring - ELK 9.x
  # ============================================
  elasticsearch:
    image: elasticsearch:9.0.3
    container_name: pdPay-elasticsearch
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - es-data:/usr/share/elasticsearch/data

  logstash:
    image: logstash:9.0.3
    container_name: pdPay-logstash
    ports:
      - "5044:5044"
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
    depends_on:
      - elasticsearch

  kibana:
    image: kibana:9.0.3
    container_name: pdPay-kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch

  # ============================================
  # Monitoring - Metrics (선택)
  # ============================================
  prometheus:
    image: prom/prometheus:latest
    container_name: pdPay-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:latest
    container_name: pdPay-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana

  # ============================================
  # Batch - Spark 4.1
  # ============================================
  spark-master:
    image: bitnami/spark:4
    container_name: pdPay-spark
    ports:
      - "8180:8080"
      - "7077:7077"
    environment:
      - SPARK_MODE=master

  # ============================================
  # API Gateway
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: pdPay-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - kafka
      - redis
      - rabbitmq

volumes:
  mysql-payment-data:
  mysql-wallet-data:
  mysql-settlement-data:
  mysql-member-data:
  kafka-data:
  rabbitmq-data:
  redis-data:
  es-data:
  grafana-data:
