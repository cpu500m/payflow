input {
  tcp {
    port => 5044
    codec => json_lines
  }
}

filter {
  # 서비스명 기반 인덱스 분리
  if [service] {
    mutate {
      add_field => { "[@metadata][index_prefix]" => "%{service}" }
    }
  } else {
    mutate {
      add_field => { "[@metadata][index_prefix]" => "payflow-unknown" }
    }
  }

  # 타임스탬프 파싱
  date {
    match => [ "timestamp", "ISO8601" ]
    target => "@timestamp"
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "payflow-%{[@metadata][index_prefix]}-%{+YYYY.MM.dd}"
  }

  # 디버깅용 (로컬 개발 시)
  stdout {
    codec => rubydebug
  }
}
