events {
    worker_connections 1024;
}

http {
    upstream payment-service {
        server host.docker.internal:8081;
    }

    upstream wallet-service {
        server host.docker.internal:8082;
    }

    upstream member-service {
        server host.docker.internal:8083;
    }

    upstream merchant-service {
        server host.docker.internal:8084;
    }

    upstream settlement-service {
        server host.docker.internal:8085;
    }

    upstream notification-service {
        server host.docker.internal:8086;
    }

    server {
        listen 80;

        # Payment Service
        location /api/v1/payments {
            proxy_pass http://payment-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Wallet Service
        location /api/v1/wallets {
            proxy_pass http://wallet-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Member Service
        location /api/v1/members {
            proxy_pass http://member-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Merchant Service
        location /api/v1/merchants {
            proxy_pass http://merchant-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Settlement Service
        location /api/v1/settlements {
            proxy_pass http://settlement-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Health check
        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }
    }
}
